name: Tests

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  test-structure:
    name: Test File Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required source files exist
        run: |
          echo "Checking source file structure..."
          required_files=(
            "source/main.brs"
            "source/lib/ApiClient.brs"
            "source/lib/Storage.brs"
            "source/lib/AuthManager.brs"
            "source/lib/SessionManager.brs"
            "source/lib/LibraryManager.brs"
            "source/components/PhlexApp.brs"
            "source/components/HomeScene.brs"
            "source/components/LoginScene.brs"
            "manifest"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Required file missing: $file"
              exit 1
            fi
            echo "  ✓ $file"
          done

      - name: Check test files exist
        run: |
          echo "Checking test file structure..."
          if [ ! -d "tests/unit" ]; then
            echo "ERROR: tests/unit directory not found"
            exit 1
          fi
          if [ ! -d "tests/integration" ]; then
            echo "ERROR: tests/integration directory not found"
            exit 1
          fi

          unit_tests=$(find tests/unit -name "*.test.brs" 2>/dev/null | wc -l)
          integration_tests=$(find tests/integration -name "*.test.brs" 2>/dev/null | wc -l)

          echo "  Found $unit_tests unit test files"
          echo "  Found $integration_tests integration test files"

          if [ "$unit_tests" -eq 0 ]; then
            echo "WARNING: No unit tests found"
          fi

  test-manifest:
    name: Validate Manifest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate manifest file
        run: |
          echo "Validating manifest..."
          if [ ! -f "manifest" ]; then
            echo "ERROR: manifest file not found"
            exit 1
          fi

          # Check required fields
          echo "title=$(grep '^title=' manifest | cut -d= -f2)" || exit 1
          echo "major_version=$(grep '^major_version=' manifest | cut -d= -f2)" || exit 1
          echo "minor_version=$(grep '^minor_version=' manifest | cut -d= -f2)" || exit 1
          echo "build_version=$(grep '^build_version=' manifest | cut -d= -f2)" || exit 1

          # Validate title exists
          if ! grep -q "^title=" manifest; then
            echo "ERROR: manifest missing title field"
            exit 1
          fi

          echo "  ✓ Manifest validation passed"

  test-brightscript-syntax:
    name: BrightScript Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check BrightScript file syntax patterns
        run: |
          echo "Running BrightScript syntax checks..."

          # Check for common syntax errors
          error_count=0

          # Check for unclosed functions
          for file in $(find source -name "*.brs"); do
            function_count=$(grep -c "^function " "$file" || echo "0")
            end_function_count=$(grep -c "^end function" "$file" || echo "0")
            sub_count=$(grep -c "^sub " "$file" || echo "0")
            end_sub_count=$(grep -c "^end sub" "$file" || echo "0")

            # Allow 0 if no functions/subs found
            if [ "$function_count" != "$end_function_count" ] && [ "$function_count" != "0" ]; then
              echo "WARNING: Mismatched function/end function in $file ($function_count vs $end_function_count)"
              error_count=$((error_count + 1))
            fi

            if [ "$sub_count" != "$end_sub_count" ] && [ "$sub_count" != "0" ]; then
              echo "WARNING: Mismatched sub/end sub in $file ($sub_count vs $end_sub_count)"
              error_count=$((error_count + 1))
            fi
          done

          if [ $error_count -gt 0 ]; then
            echo "Found $error_count syntax issues"
            # Don't fail on syntax warnings since we can't run BrightScript directly
          fi

          echo "  ✓ Syntax check complete (basic validation)"

  test-components:
    name: Component XML Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate component XML structure
        run: |
          echo "Validating component XML files..."

          for xml_file in $(find source/components -name "*.xml" 2>/dev/null); do
            # Check for basic XML structure
            if ! grep -q '<?xml version' "$xml_file"; then
              echo "WARNING: $xml_file missing XML declaration"
            fi

            # Check for component tag
            if ! grep -q '<component' "$xml_file"; then
              echo "ERROR: $xml_file missing <component> tag"
              exit 1
            fi

            # Check for script reference
            if ! grep -q '<script type="text/brightscript"' "$xml_file"; then
              echo "WARNING: $xml_file missing script reference"
            fi
          done

          echo "  ✓ Component XML validation complete"

  test-package:
    name: Package Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify package contents
        run: |
          echo "Verifying package structure..."

          # Create a test package
          if command -v zip &> /dev/null; then
            zip -r test-phlex.zip manifest source images 2>/dev/null
            if [ -f "test-phlex.zip" ]; then
              echo "  ✓ Package created successfully"
              unzip -l test-phlex.zip | head -20
              rm test-phlex.zip
            else
              echo "WARNING: Could not create package"
            fi
          else
            echo "  (zip not available, skipping package test)"
          fi

  test-readme:
    name: Documentation Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check documentation files
        run: |
          echo "Checking documentation..."

          if [ -f "README.md" ]; then
            echo "  ✓ README.md exists"
            # Check for required sections
            grep -q "^## Features" README.md && echo "  ✓ README has Features section" || echo "  WARNING: README missing Features section"
            grep -q "^## Installation" README.md && echo "  ✓ README has Installation section" || echo "  WARNING: README missing Installation section"
            grep -q "^## Building" README.md && echo "  ✓ README has Building section" || echo "  WARNING: README missing Building section"
          else
            echo "ERROR: README.md not found"
            exit 1
          fi

          if [ -f "DEVELOPER.md" ]; then
            echo "  ✓ DEVELOPER.md exists"
          else
            echo "WARNING: DEVELOPER.md not found"
          fi
