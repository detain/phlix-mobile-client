name: Lint

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - '**.brs'
      - '**.xml'
      - '.github/workflows/lint.yml'
  pull_request:
    branches: [ master, main, develop ]
    paths:
      - '**.brs'
      - '**.xml'
      - '.github/workflows/lint.yml'

jobs:
  lint-brightscript:
    name: BrightScript Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run BrightScript Lint Checks
        run: |
          echo "Running BrightScript lint checks..."

          # Initialize counters
          issues=0

          # Check for console.log (debug artifact - should be print in BrightScript)
          console_logs=$(grep -rn "console.log" source/ 2>/dev/null || true)
          if [ -n "$console_logs" ]; then
            echo "ERROR: Found console.log (use print instead):"
            echo "$console_logs"
            issues=$((issues + 1))
          fi

          # Check for TODO/FIXME comments
          todos=$(grep -rn "TODO\|FIXME" source/ 2>/dev/null || true)
          if [ -n "$todos" ]; then
            echo "WARNING: Found TODO/FIXME comments:"
            echo "$todos"
          fi

          # Check for hardcoded credentials (basic check)
          if grep -rq "password.*=.*['\"][^'\"]{8,}['\"]" source/ 2>/dev/null; then
            echo "WARNING: Possible hardcoded password found"
          fi

          # Check for any API keys or tokens in code
          if grep -rq "api[_-]key\|apikey\|secret" source/ 2>/dev/null | grep -v "^#"; then
            echo "WARNING: Possible hardcoded API key found"
          fi

          # Check for debug statements left in code
          debug_print=$(grep -rn 'print "DEBUG' source/ 2>/dev/null || true)
          if [ -n "$debug_print" ]; then
            echo "WARNING: Debug print statements found (remove before commit):"
            echo "$debug_print"
          fi

          if [ $issues -gt 0 ]; then
            echo "FAILED: $issues critical issues found"
            exit 1
          fi

          echo "  ✓ No critical lint issues"

  lint-formatting:
    name: Code Formatting Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check file formatting
        run: |
          echo "Checking code formatting..."

          # Check for trailing whitespace
          trailing_ws=$(grep -rn " $" source/ 2>/dev/null || true)
          if [ -n "$trailing_ws" ]; then
            echo "WARNING: Files with trailing whitespace found"
            echo "$trailing_ws" | head -5
          fi

          # Check for inconsistent line endings (basic)
          if file source/main.brs 2>/dev/null | grep -q "CRLF"; then
            echo "WARNING: File has CRLF line endings, use LF"
          fi

          # Check for very long lines (over 200 chars)
          long_lines=0
          for file in $(find source -name "*.brs"); do
            while IFS= read -r line; do
              if [ ${#line} -gt 200 ]; then
                long_lines=$((long_lines + 1))
              fi
            done < "$file"
          done

          if [ $long_lines -gt 0 ]; then
            echo "WARNING: Found $long_lines lines over 200 characters"
          fi

          echo "  ✓ Formatting check complete"

  lint-naming:
    name: Naming Convention Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check naming conventions
        run: |
          echo "Checking naming conventions..."

          # BrightScript naming conventions:
          # - Functions: PascalCase (GetUserData)
          # - Variables: camelCase (userName)
          # - Constants: UPPER_SNAKE_CASE (MAX_RETRIES)
          # - Files: PascalCase (ApiClient.brs)

          # Check function names follow PascalCase
          bad_functions=$(grep -rn "^function [a-z]" source/ 2>/dev/null || true)
          if [ -n "$bad_functions" ]; then
            echo "WARNING: Functions should use PascalCase:"
            echo "$bad_functions" | head -5
          fi

          # Check sub names follow PascalCase
          bad_subs=$(grep -rn "^sub [a-z]" source/ 2>/dev/null || true)
          if [ -n "$bad_subs" ]; then
            echo "WARNING: Subs should use PascalCase:"
            echo "$bad_subs" | head -5
          fi

          # Check for constants in UPPER_SNAKE
          constants=$(grep -rn "^[A-Z][A-Z_]* =" source/ 2>/dev/null || true)
          if [ -n "$constants" ]; then
            echo "  ✓ Constants properly named (UPPER_SNAKE_CASE)"
          fi

          echo "  ✓ Naming convention check complete"

  lint-xml:
    name: XML Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate XML syntax
        run: |
          echo "Validating XML files..."

          for xml_file in $(find source -name "*.xml"); do
            # Check for valid XML syntax
            if command -v xmllint &> /dev/null; then
              if ! xmllint --noout "$xml_file" 2>/dev/null; then
                echo "ERROR: Invalid XML in $xml_file"
              fi
            else
              # Basic check without xmllint
              if ! grep -q '<?xml version' "$xml_file"; then
                echo "WARNING: $xml_file missing XML declaration"
              fi
              if ! grep -q '</component>' "$xml_file"; then
                echo "WARNING: $xml_file missing closing </component>"
              fi
            fi
          done

          echo "  ✓ XML validation complete"

  lint-security:
    name: Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security checks
        run: |
          echo "Running security checks..."

          # Check for potential SQL injection patterns
          sql_patterns=$(grep -rn "Execute\|CreateObject.*roUrlTransfer" source/ 2>/dev/null || true)
          if [ -n "$sql_patterns" ]; then
            echo "  Checking roUrlTransfer usage for security issues..."
          fi

          # Check for eval-like patterns (dangerous in BrightScript)
          eval_patterns=$(grep -rn "Eval\|ExecuteGlobal" source/ 2>/dev/null || true)
          if [ -n "$eval_patterns" ]; then
            echo "WARNING: Potentially dangerous Eval/ExecuteGlobal found:"
            echo "$eval_patterns"
          fi

          # Check for insecure HTTP URLs (should use HTTPS)
          http_urls=$(grep -rn 'http://' source/ 2>/dev/null | grep -v "localhost" | grep -v "#" || true)
          if [ -n "$http_urls" ]; then
            echo "INFO: Found non-localhost HTTP URLs (consider HTTPS):"
            echo "$http_urls" | head -5
          fi

          # Verify proper URL encoding in API calls
          url_params=$(grep -rn 'AddHeader.*$' source/ 2>/dev/null || true)

          echo "  ✓ Security check complete"

  lint-best-practices:
    name: Best Practices Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check best practices
        run: |
          echo "Checking BrightScript best practices..."

          # Check for error handling
          functions_without_error_check=0
          for file in $(find source/lib -name "*.brs"); do
            func_count=$(grep -c "^function\|^sub" "$file" 2>/dev/null || echo "0")
            if [ "$func_count" -gt 0 ]; then
              # Check if function has try/catch or invalid checks
              if ! grep -q "try\|catch\|if .* invalid\|if .*<> invalid" "$file"; then
                functions_without_error_check=$((functions_without_error_check + 1))
              fi
            fi
          done

          if [ $functions_without_error_check -gt 0 ]; then
            echo "INFO: $functions_without_error_check files may lack error handling"
          fi

          # Check for proper comment headers on functions
          files_without_comments=0
          for file in $(find source/lib -name "*.brs"); do
            if ! grep -q "^'" "$file"; then
              files_without_comments=$((files_without_comments + 1))
            fi
          done

          if [ $files_without_comments -gt 0 ]; then
            echo "INFO: $files_without_comments files lack comments"
          fi

          # Check for proper field type declarations in XML
          xml_without_fields=$(grep -L '<field' source/components/*.xml 2>/dev/null || true)
          if [ -n "$xml_without_fields" ]; then
            echo "INFO: Some XML files don't declare interface fields"
          fi

          echo "  ✓ Best practices check complete"
