pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    includeBuild("../node_modules/@react-native/gradle-plugin")
}
plugins { id("com.facebook.react.settings") }
extensions.configure(com.facebook.react.ReactSettingsExtension) { ex -> ex.autolinkLibrariesFromCommand() }

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' }
    }
}

rootProject.name = 'PhlixMobile'
include ':app'
// Top-level includeBuild (in ADDITION to the pluginManagement one) — this is what
// supplies the unversioned buildscript classpath deps (AGP, kotlin, RN gradle
// plugin) in android/build.gradle via composite-build substitution. Matches the
// RN 0.85.3 community template, which includeBuilds the plugin in both places.
includeBuild('../node_modules/@react-native/gradle-plugin')
