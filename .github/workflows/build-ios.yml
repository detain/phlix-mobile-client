name: Build iOS

# iOS builds require macOS and are typically manual due to resource constraints
# Uncomment the trigger below to run on every push to main branch
# on:
#   push:
#     branches: [main, master]
#   pull_request:
#     branches: [main, master]

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration (Debug/Release)'
        required: true
        default: 'Debug'
        type: choice
        options:
          - Debug
          - Release
      simulator:
        description: 'iOS Simulator name'
        required: true
        default: 'iPhone 15'
        type: string

jobs:
  build-ios:
    name: Build iOS (${{ inputs.configuration }})
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install iOS dependencies
        run: cd ios && pod install && cd ..

      - name: Build iOS
        run: |
          xcodebuild -workspace ios/PhlexMobile.xcworkspace \
            -scheme PhlexMobile \
            -configuration ${{ inputs.configuration }} \
            -destination 'platform=iOS Simulator,name=${{ inputs.simulator }}' \
            build CODE_SIGNING_ALLOWED=NO

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: inputs.configuration == 'Debug'
        with:
          name: ios-build-debug
          path: |
            ios/main.jsbundle
            ios/build/Build/Products/${{ inputs.configuration }}-*/PhlexMobile.app.dSYM.zip
          retention-days: 7
