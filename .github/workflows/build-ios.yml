name: Build iOS

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build-ios-debug:
    name: Build iOS (Debug)
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Clean iOS build directories
        run: rm -rf ios/build ios/Pods ios/Podfile.lock

      - name: Install iOS dependencies
        run: cd ios && pod install && cd ..

      - name: Build iOS (Debug)
        run: |
          xcodebuild -workspace ios/PhlixMobile.xcworkspace \
            -scheme PhlixMobile \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ios/build \
            build CODE_SIGNING_ALLOWED=NO

      - name: Create JS bundle
        run: npx metro build index.js --platform ios --out ios/main.jsbundle --minify false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ios-build-debug
          path: |
            ios/main.jsbundle
            ios/build/Build/Products/Debug-iphonesimulator/PhlixMobile.app.dSYM.zip
          retention-days: 7

  build-ios-release:
    name: Build iOS (Release)
    runs-on: macos-15
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Clean iOS build directories
        run: rm -rf ios/build ios/Pods ios/Podfile.lock

      - name: Install iOS dependencies
        run: cd ios && pod install && cd ..

      - name: Create JS bundle
        run: npx metro build index.js --platform ios --out ios/main.jsbundle --minify false

      - name: Build iOS (Release)
        run: |
          xcodebuild -workspace ios/PhlixMobile.xcworkspace \
            -scheme PhlixMobile \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ios/build \
            build CODE_SIGNING_ALLOWED=NO

      - name: Upload Release build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ios-build-release
          path: |
            ios/main.jsbundle
            ios/build/Build/Products/Release-iphonesimulator/PhlixMobile.app.dSYM.zip
          retention-days: 14
